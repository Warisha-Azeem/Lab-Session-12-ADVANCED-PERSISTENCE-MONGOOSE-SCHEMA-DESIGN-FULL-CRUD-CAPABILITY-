<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lab 12: CRUD Lifecycle Management</title>
<style>
body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; padding: 20px; }
.crud-box { border: 1px solid #3b82f6; padding: 20px; max-width: 480px; background: #1e293b; border-radius: 8px; }
h3 { color: #3b82f6; margin-top: 0; }
button { background: #3b82f6; color: white; border: none; padding: 8px; cursor: pointer; font-weight: bold; border-radius: 4px; width: 100%; margin: 4px 0; }
button:hover { background: #2563eb; }
.terminal-output { background: #000; border: 1px solid #334155; padding: 12px; margin-top: 15px; border-left: 4px solid #3b82f6; font-family: monospace; min-height: 120px; font-size: 0.8rem; max-height: 220px; overflow-y: auto;}
input { width: 95%; padding: 8px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #475569; background: #0f172a; color: #fff; }
.product-card { background: #1e293b; border: 1px solid #475569; padding: 8px; margin: 6px 0; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;}
.badge-NOMINAL { color: #4ade80; } .badge-CRITICAL { color: #fbbf24; } .badge-DEPLETED { color: #f87171; }
.small-btn { width: auto; background: #dc2626; padding: 4px 8px; font-size: 0.75rem; margin: 0 2px;}
</style>
</head>
<body>
<div class="crud-box">
<h3>System Inventory (Full CRUD Node)</h3>
<input type="text" id="prodName" placeholder="Enter Product Name...">
<input type="number" id="prodQty" placeholder="Enter Base Quantity...">
<button id="createBtn">1. Create Document (POST)</button>
<button id="readBtn" style="background: #10b981;">2. Read Collection (GET)</button>
<div class="terminal-output" id="consoleBox">Awaiting data lifecycle instructions...</div>
</div>
<script>
const consoleBox = document.getElementById('consoleBox');

document.getElementById('createBtn').addEventListener('click', () => {
  const name = document.getElementById('prodName').value;
  const qty = document.getElementById('prodQty').value;
  fetch('/api/products', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name, qty: qty })
  })
    .then(res => res.json())
    .then(res => {
      if(res.success) consoleBox.innerHTML = `[Created]: ${res.data.productName} initialized with ID: ${res.data._id}`;
      else consoleBox.innerHTML = `[Error]: ${res.error}`;
    });
});

const loadInventory = () => {
  fetch('/api/products')
    .then(res => res.json())
    .then(res => {
      consoleBox.innerHTML = "";
      if(res.data.length === 0) { consoleBox.innerHTML = "No storage inventory found."; return; }
      res.data.forEach(item => {
        consoleBox.innerHTML += `
        <div class="product-card">
          <div>
            <strong>${item.productName}</strong>: Qty ${item.quantity}
            [<span class="badge-${item.status}">${item.status}</span>]
          </div>
          <div>
            <button class="small-btn" style="background: #eab308;" onclick="updateItem('${item._id}')">↓</button>
            <button class="small-btn" onclick="deleteItem('${item._id}')">X</button>
          </div>
        </div>`;
      });
    });
};
document.getElementById('readBtn').addEventListener('click', loadInventory);

window.updateItem = (id) => {
  const newQty = prompt("Enter new inventory quantity count register value:");
  if (newQty === null) return;
  fetch(`/api/products/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ qty: parseInt(newQty) })
  })
    .then(res => res.json())
    .then(res => {
      if(res.success) loadInventory();
      else alert("Update Exception Rejected: " + res.error);
    });
};

window.deleteItem = (id) => {
  if(!confirm("Execute hardware sector clear instruction on this document?")) return;
  fetch(`/api/products/${id}`, { method: 'DELETE' })
    .then(res => res.json())
    .then(res => { loadInventory(); consoleBox.innerHTML = `[Deleted]: ${res.message}`; });
};
</script>
</body>
</html>
